<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positions — Oanda Trading Center</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
    --border: #2e3350; --text: #e8eaf6; --muted: #7b82b0;
    --green: #00e676; --red: #ff5252; --amber: #ffab40;
    --blue: #448aff; --purple: #e040fb;
    --card-radius: 12px; --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  nav {
    display: flex; align-items: center; gap: 8px; padding: 12px 20px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  nav .brand { font-weight: 700; font-size: 15px; color: var(--blue); margin-right: 12px; }
  nav a { color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
  nav a:hover, nav a.active { background: var(--bg3); color: var(--text); }
  nav .balance { margin-left: auto; font-size: 13px; color: var(--muted); }
  nav .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--card-radius); padding: 14px 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .stat-card .value { font-size: 22px; font-weight: 600; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red   { color: var(--red); }
  .stat-card .value.amber { color: var(--amber); }

  .positions-list { display: flex; flex-direction: column; gap: 14px; }

  .position-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--card-radius); overflow: hidden;
    transition: border-color .2s;
  }
  .position-card:hover { border-color: var(--blue); }
  .position-card.winning { border-left: 3px solid var(--green); }
  .position-card.losing  { border-left: 3px solid var(--red); }

  .pos-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .pos-instrument { font-size: 16px; font-weight: 700; }
  .pos-direction {
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .pos-direction.buy  { background: rgba(0,230,118,.15); color: var(--green); }
  .pos-direction.sell { background: rgba(255,82,82,.15);  color: var(--red); }
  .pos-units { color: var(--muted); font-size: 13px; }
  .pos-pnl {
    margin-left: auto; font-size: 18px; font-weight: 700;
  }
  .pos-pnl.green { color: var(--green); }
  .pos-pnl.red   { color: var(--red); }

  .pos-body { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0; }
  .pos-stat {
    padding: 12px 18px; border-right: 1px solid var(--border);
  }
  .pos-stat:last-child { border-right: none; }
  .pos-stat .ps-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .pos-stat .ps-val   { font-size: 14px; font-weight: 600; }
  .ps-val.green { color: var(--green); }
  .ps-val.red   { color: var(--red); }

  .pos-actions {
    display: flex; gap: 8px; padding: 12px 18px;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; transition: all .2s;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .btn-be   { background: rgba(255,171,64,.1);  color: var(--amber); border-color: rgba(255,171,64,.3); }
  .btn-be:hover { background: rgba(255,171,64,.25); }
  .btn-trail { background: rgba(68,138,255,.1);  color: var(--blue); border-color: rgba(68,138,255,.3); }
  .btn-trail:hover { background: rgba(68,138,255,.25); }
  .btn-modify { background: rgba(224,64,251,.1); color: var(--purple); border-color: rgba(224,64,251,.3); }
  .btn-modify:hover { background: rgba(224,64,251,.25); }
  .btn-close { background: rgba(255,82,82,.1);   color: var(--red);   border-color: rgba(255,82,82,.3); }
  .btn-close:hover { background: rgba(255,82,82,.25); }

  .be-progress {
    height: 4px; background: var(--border); border-radius: 2px;
    margin: 0 18px 12px;
  }
  .be-progress .bar {
    height: 100%; border-radius: 2px; transition: width .3s;
  }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; width: 380px; max-width: 95vw;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .modal input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-size: 14px; margin-bottom: 12px;
  }
  .modal input:focus { outline: none; border-color: var(--blue); }
  .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 13px; }
  .btn-cancel { background: var(--bg3); color: var(--muted); }
  .btn-confirm { background: var(--blue); color: #fff; }
  .btn-confirm:hover { opacity: .9; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
    z-index: 200; animation: slideIn .3s ease;
    max-width: 320px;
  }
  .toast.success { background: rgba(0,230,118,.15); border: 1px solid var(--green); color: var(--green); }
  .toast.error   { background: rgba(255,82,82,.15);  border: 1px solid var(--red);   color: var(--red); }
  @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty i { font-size: 40px; margin-bottom: 12px; display: block; }

  @media (max-width: 600px) {
    .pos-header { flex-direction: column; align-items: flex-start; }
    .pos-pnl { margin-left: 0; }
  }
</style>
</head>
<body>

<nav>
  <span class="brand">⚡ OANDA</span>
  <a href="index.html">Dashboard</a>
  <a href="calculator.html">Calculator</a>
  <a href="positions.html" class="active">Positions</a>
  <a href="journal.html">Journal</a>
  <a href="risk.html">Risk</a>
  <span class="balance"><span class="dot"></span> <span id="nav-balance">Loading…</span></span>
</nav>

<main>
  <h1>Open Positions</h1>
  <p class="sub">Live P&L · Breakeven · Trailing stops · Modify or close trades</p>

  <div class="summary-grid">
    <div class="stat-card">
      <div class="label">Open trades</div>
      <div class="value" id="stat-count">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Unrealized P&L</div>
      <div class="value" id="stat-pnl">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Winning</div>
      <div class="value green" id="stat-winning">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Losing</div>
      <div class="value red" id="stat-losing">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Margin used</div>
      <div class="value amber" id="stat-margin">—</div>
    </div>
  </div>

  <div class="positions-list" id="positions-list">
    <div class="empty"><i class="fa fa-spinner fa-spin"></i>Loading positions…</div>
  </div>
</main>

<!-- Modify SL/TP Modal -->
<div class="modal-bg" id="modify-modal">
  <div class="modal">
    <h3>Modify Trade — <span id="modal-instrument">—</span></h3>
    <label>Stop Loss (price level)</label>
    <input type="number" id="modal-sl" step="any" placeholder="e.g. 3210.50">
    <label>Take Profit (price level)</label>
    <input type="number" id="modal-tp" step="any" placeholder="e.g. 3380.00">
    <input type="hidden" id="modal-trade-id">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="submitModify()">Update</button>
    </div>
  </div>
</div>

<script>
const API = 'https://oanda-trading-center.onrender.com';  // ← UPDATE to your Render URL

async function loadAll() {
  try {
    const [accRes, tradeRes] = await Promise.all([
      fetch(`${API}/api/account`).then(r => r.json()),
      fetch(`${API}/api/trades`).then(r => r.json()),
    ]);

    const acc = accRes.account || {};
    const balance = parseFloat(acc.balance || 0);
    const nav_    = parseFloat(acc.NAV || acc.balance || 0);
    const unrealized = parseFloat(acc.unrealizedPL || 0);
    const marginUsed = parseFloat(acc.marginUsed || 0);
    const marginUsedPct = nav_ > 0 ? (marginUsed / nav_ * 100).toFixed(1) : '—';

    document.getElementById('nav-balance').textContent = `£${balance.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2})}`;

    const openTrades = tradeRes.trades || [];
    document.getElementById('stat-count').textContent = openTrades.length;

    let winning = 0, losing = 0;
    openTrades.forEach(t => {
      const pnl = parseFloat(t.unrealizedPL || 0);
      if (pnl > 0) winning++; else if (pnl < 0) losing++;
    });

    const unrealEl = document.getElementById('stat-pnl');
    unrealEl.textContent = (unrealized >= 0 ? '+' : '') + unrealized.toFixed(2);
    unrealEl.className = 'value ' + (unrealized >= 0 ? 'green' : 'red');
    document.getElementById('stat-winning').textContent = winning;
    document.getElementById('stat-losing').textContent = losing;
    document.getElementById('stat-margin').textContent = `${marginUsedPct}%`;

    renderPositions(openTrades, balance);
  } catch(e) {
    document.getElementById('positions-list').innerHTML =
      `<div class="empty"><i class="fa fa-exclamation-triangle"></i>Failed to load: ${e.message}</div>`;
  }
}

function renderPositions(trades, balance) {
  const el = document.getElementById('positions-list');
  if (!trades.length) {
    el.innerHTML = `<div class="empty"><i class="fa fa-inbox"></i>No open positions</div>`;
    return;
  }

  el.innerHTML = trades.map(t => {
    const pnl      = parseFloat(t.unrealizedPL || 0);
    const units    = parseInt(t.currentUnits);
    const dir      = units > 0 ? 'BUY' : 'SELL';
    const entry    = parseFloat(t.price || 0);
    const sl       = t.stopLossOrder  ? parseFloat(t.stopLossOrder.price)  : null;
    const tp       = t.takeProfitOrder ? parseFloat(t.takeProfitOrder.price) : null;
    const tsl      = t.trailingStopLossOrder ? t.trailingStopLossOrder.distance : null;
    const isWin    = pnl >= 0;
    const pnlStr   = (pnl >= 0 ? '+' : '') + pnl.toFixed(2);

    // Progress toward breakeven (1:1)
    const slDist   = sl ? Math.abs(entry - sl) : 0;
    const priceDist = Math.abs(parseFloat(t.currentUnits > 0
      ? (t.price - sl) : (sl - t.price)));
    let beProgress = slDist > 0 ? Math.min(100, Math.max(0, (pnl / (slDist * Math.abs(units))) * 100)) : 0;

    return `
    <div class="position-card ${isWin ? 'winning' : 'losing'}">
      <div class="pos-header">
        <span class="pos-instrument">${t.instrument.replace('_','/')}</span>
        <span class="pos-direction ${dir.toLowerCase()}">${dir}</span>
        <span class="pos-units">${Math.abs(units).toLocaleString()} units</span>
        <span class="pos-pnl ${isWin ? 'green' : 'red'}">${pnlStr}</span>
      </div>

      <div class="be-progress" title="Progress to 1:1 (breakeven trigger)">
        <div class="bar" style="width:${beProgress}%;background:${isWin ? 'var(--green)' : 'var(--red)'}"></div>
      </div>

      <div class="pos-body">
        <div class="pos-stat">
          <div class="ps-label">Entry</div>
          <div class="ps-val">${entry}</div>
        </div>
        <div class="pos-stat">
          <div class="ps-label">Stop Loss</div>
          <div class="ps-val ${sl ? 'red' : ''}">${sl !== null ? sl : '—'}</div>
        </div>
        <div class="pos-stat">
          <div class="ps-label">Take Profit</div>
          <div class="ps-val ${tp ? 'green' : ''}">${tp !== null ? tp : '—'}</div>
        </div>
        <div class="pos-stat">
          <div class="ps-label">Trailing SL</div>
          <div class="ps-val ${tsl ? 'amber' : 'muted'}">${tsl ? `${tsl} pips` : 'Off'}</div>
        </div>
        <div class="pos-stat">
          <div class="ps-label">BE Progress</div>
          <div class="ps-val ${isWin ? 'green' : 'red'}">${beProgress.toFixed(0)}%</div>
        </div>
        <div class="pos-stat">
          <div class="ps-label">Trade ID</div>
          <div class="ps-val" style="font-size:12px;color:var(--muted)">${t.id}</div>
        </div>
      </div>

      <div class="pos-actions">
        <button class="btn btn-be"    onclick="doBreakeven('${t.id}', '${t.instrument}')">
          <i class="fa fa-shield-halved"></i> Breakeven
        </button>
        <button class="btn btn-trail" onclick="doTrailing('${t.id}', '${t.instrument}')">
          <i class="fa fa-route"></i> Trailing Stop
        </button>
        <button class="btn btn-modify" onclick="openModify('${t.id}', '${t.instrument}', ${sl||''}, ${tp||''})">
          <i class="fa fa-pen"></i> Modify
        </button>
        <button class="btn btn-close" onclick="doClose('${t.id}', '${t.instrument}')">
          <i class="fa fa-xmark"></i> Close
        </button>
      </div>
    </div>`;
  }).join('');
}

async function doBreakeven(tradeId, instrument) {
  if (!confirm(`Move SL to entry price (breakeven) for ${instrument.replace('_','/')}?`)) return;
  try {
    const res = await fetch(`${API}/api/breakeven`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({trade_id: tradeId})
    });
    const data = await res.json();
    if (data.success) {
      toast(`✓ Breakeven set @ ${data.breakeven_price}`, 'success');
      setTimeout(loadAll, 1500);
    } else {
      toast(`Error: ${data.detail}`, 'error');
    }
  } catch(e) { toast(`Failed: ${e.message}`, 'error'); }
}

async function doTrailing(tradeId, instrument) {
  const pips = prompt(`Trailing stop distance in pips for ${instrument.replace('_','/')}?\n(Leave blank to use 1× ATR)`);
  if (pips === null) return;
  const body = {trade_id: tradeId, instrument: instrument};
  if (pips.trim()) body.trail_pips = parseFloat(pips);
  try {
    const res = await fetch(`${API}/api/trailing-stop`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      toast(`✓ Trailing stop set: ${data.trail_pips} pips`, 'success');
      setTimeout(loadAll, 1500);
    } else {
      toast(`Error: ${data.detail}`, 'error');
    }
  } catch(e) { toast(`Failed: ${e.message}`, 'error'); }
}

function openModify(tradeId, instrument, sl, tp) {
  document.getElementById('modal-trade-id').value   = tradeId;
  document.getElementById('modal-instrument').textContent = instrument.replace('_','/');
  document.getElementById('modal-sl').value = sl || '';
  document.getElementById('modal-tp').value = tp || '';
  document.getElementById('modify-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modify-modal').classList.remove('open');
}

async function submitModify() {
  const tradeId    = document.getElementById('modal-trade-id').value;
  const instrument = document.getElementById('modal-instrument').textContent.replace('/','_');
  const sl = parseFloat(document.getElementById('modal-sl').value) || null;
  const tp = parseFloat(document.getElementById('modal-tp').value) || null;
  closeModal();
  try {
    const res = await fetch(`${API}/api/modify-trade`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({trade_id: tradeId, instrument, sl_price: sl, tp_price: tp})
    });
    const data = await res.json();
    if (data.success) {
      toast('✓ Trade updated', 'success');
      setTimeout(loadAll, 1500);
    } else {
      toast(`Error: ${data.detail}`, 'error');
    }
  } catch(e) { toast(`Failed: ${e.message}`, 'error'); }
}

async function doClose(tradeId, instrument) {
  if (!confirm(`Close ${instrument.replace('_','/')} trade? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}/api/close-trade`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({trade_id: tradeId})
    });
    const data = await res.json();
    if (data.success) {
      toast('✓ Trade closed', 'success');
      setTimeout(loadAll, 1500);
    } else {
      toast(`Error: ${data.detail}`, 'error');
    }
  } catch(e) { toast(`Failed: ${e.message}`, 'error'); }
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
